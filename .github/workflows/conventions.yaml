name: Coding Conventions

# ------------------------------------------------------------------------------
# Workflow Settings
# ------------------------------------------------------------------------------

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  # ----------------------------------------------------------------------------
  # PR Size Check
  # ----------------------------------------------------------------------------

  pr-size-check:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PRAXIS_BOT_APP_ID }}
          private-key: ${{ secrets.PRAXIS_BOT_APP_PRIVATE_KEY }}

      - name: Check PR size
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MAX_ADDITIONS: "750"
        run: |
          labels=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json labels -q '.labels[].name')
          if echo "$labels" | grep -q '^skip/pr-conventions$'; then
            echo "skip/pr-conventions label present — skipping size check"
            exit 0
          fi

          if [ "${{ github.event.action }}" = "reopened" ]; then
            perm=$(gh api repos/${{ github.repository }}/collaborators/${{ github.event.sender.login }}/permission -q .permission)
            if [ "$perm" = "admin" ] || [ "$perm" = "maintain" ]; then
              gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" --add-label "skip/pr-conventions"
              echo "Maintainer reopened — added skip/pr-conventions label"
              exit 0
            fi
          fi

          added=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" --paginate \
            --jq '[.[] | select(.filename | test("Cargo\\.(lock|toml)$|^(examples/|tests/|benchmarks/|docs/)") | not) | select(.filename | test("\\.md$") | not) | .additions] | add // 0')

          if [ "$added" -gt "$MAX_ADDITIONS" ]; then
            marker="<!-- praxis:pr-size-check -->"
            already=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --jq "[.[] | select(.body | contains(\"${marker}\"))] | length")
            if [ "$already" -eq 0 ]; then
              gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" \
                --body "${marker}
          **PR too large**: ${added} lines added (limit: ${MAX_ADDITIONS}, excludes Cargo files, tests, docs, examples, and benchmarks). Please split into smaller PRs. Add \`skip/pr-conventions\` label to override."
            fi
            echo "::error::PR has ${added} lines added (limit: ${MAX_ADDITIONS})"
            exit 1
          fi

  # ----------------------------------------------------------------------------
  # PR Description Check
  # ----------------------------------------------------------------------------

  pr-description-check:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PRAXIS_BOT_APP_ID }}
          private-key: ${{ secrets.PRAXIS_BOT_APP_PRIVATE_KEY }}

      - name: Check for description
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          labels=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json labels -q '.labels[].name')
          if echo "$labels" | grep -q '^skip/pr-conventions$'; then
            echo "skip/pr-conventions label present — skipping description check"
            exit 0
          fi

          word_count=$(echo "$PR_BODY" | wc -w)
          if [ "$word_count" -lt 2 ]; then
            marker="<!-- praxis:pr-description-check -->"
            already=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --jq "[.[] | select(.body | contains(\"${marker}\"))] | length")
            if [ "$already" -eq 0 ]; then
              gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" \
                --body "${marker}
          Please add a description to this PR explaining what it does and why. See our [coding conventions](docs/developing/conventions.md)."
            fi
          fi

  # ----------------------------------------------------------------------------
  # Dependency Version Check
  # ----------------------------------------------------------------------------

  dep-version-check:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PRAXIS_BOT_APP_ID }}
          private-key: ${{ secrets.PRAXIS_BOT_APP_PRIVATE_KEY }}

      - name: Check workspace dependency versions
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          labels=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json labels -q '.labels[].name')
          if echo "$labels" | grep -q '^skip/dep-versioning$'; then
            echo "skip/dep-versioning label present — skipping version check"
            exit 0
          fi

          gh api "repos/${{ github.repository }}/contents/Cargo.toml?ref=$HEAD_SHA" \
            --jq '.content' | base64 -d > /tmp/cargo.toml

          in_ws=false
          bad=0
          skip_next=false
          while IFS= read -r line; do
            if [[ "$line" == "[workspace.dependencies]" ]]; then
              in_ws=true
              skip_next=false
              continue
            elif [[ "$line" == "["* ]]; then
              in_ws=false
              skip_next=false
              continue
            fi

            $in_ws || continue
            [[ -z "$line" ]] && continue

            if [[ "$line" == "#"* ]]; then
              [[ "$line" == *"semver:ignore"* ]] && skip_next=true
              continue
            fi

            if $skip_next || [[ "$line" == *"semver:ignore"* ]]; then
              skip_next=false
              continue
            fi
            skip_next=false

            ver=""
            if [[ "$line" =~ ^[a-zA-Z][a-zA-Z0-9_-]*[[:space:]]*=[[:space:]]*\"([^\"]+)\" ]]; then
              ver="${BASH_REMATCH[1]}"
            elif [[ "$line" =~ version[[:space:]]*=[[:space:]]*\"([^\"]+)\" ]]; then
              ver="${BASH_REMATCH[1]}"
            fi

            if [[ -n "$ver" ]]; then
              dots="${ver//[^.]/}"
              if [[ ${#dots} -ne 2 ]]; then
                crate="${line%%[[:space:]]*=*}"
                echo "::error::${crate} = \"${ver}\" is not three-component semver (expected MAJOR.MINOR.PATCH)"
                bad=1
              fi
            fi
          done < /tmp/cargo.toml

          if [[ "$bad" -eq 1 ]]; then
            exit 1
          fi

  # ----------------------------------------------------------------------------
  # Signed Commits Check
  # ----------------------------------------------------------------------------

  signed-commits-check:
    if: |
      !startsWith(github.head_ref, 'release-notes/pr-') ||
      github.event.pull_request.user.login != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PRAXIS_BOT_APP_ID }}
          private-key: ${{ secrets.PRAXIS_BOT_APP_PRIVATE_KEY }}

      - name: Check signed commits in PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          labels=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json labels -q '.labels[].name')
          if echo "$labels" | grep -q '^skip/commit-signing$'; then
            echo "skip/commit-signing label present — skipping signing check"
            exit 0
          fi

          unsigned=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/commits" \
            --paginate --jq '[.[] | select(.parents | length == 1) | select(.commit.verification.verified == false) | .sha[:7]] | join(", ")')

          if [ -n "$unsigned" ]; then
            marker="<!-- praxis:signed-commits-check -->"
            already=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --jq "[.[] | select(.body | contains(\"${marker}\"))] | length")
            if [ "$already" -eq 0 ]; then
              gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" \
                --body "${marker}
          **Unsigned commits**: ${unsigned}. Please [sign your commits](https://docs.github.com/en/authentication/managing-commit-signature-verification)."
            fi
            echo "::error::Unsigned commits found: ${unsigned}"
            exit 1
          fi

  # ----------------------------------------------------------------------------
  # Signoff Check
  # ----------------------------------------------------------------------------

  signoff-check:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PRAXIS_BOT_APP_ID }}
          private-key: ${{ secrets.PRAXIS_BOT_APP_PRIVATE_KEY }}

      - name: Check commits for Signed-off-by
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          labels=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json labels -q '.labels[].name')
          if echo "$labels" | grep -q '^skip/signoff$'; then
            echo "skip/signoff label present — skipping signoff check"
            exit 0
          fi

          missing=$(gh api \
            "repos/${{ github.repository }}/pulls/${PR_NUMBER}/commits" \
            --paginate \
            --jq '[.[] | select(.parents | length == 1) | select(.commit.message | test("(?m)^Signed-off-by: ") | not) | .sha[:7]] | join(", ")')

          if [ -n "$missing" ]; then
            marker="<!-- praxis:signoff-check -->"
            already=$(gh api \
              "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --jq "[.[] | select(.body | contains(\"${marker}\"))] | length")
            if [ "$already" -eq 0 ]; then
              gh pr comment "$PR_NUMBER" \
                --repo "${{ github.repository }}" \
                --body "${marker}
          **Missing Signed-off-by**: ${missing}. All commits require sign-off (via \`git commit --signoff\`)."
            fi
            echo "::error::Commits missing Signed-off-by: ${missing}"
            exit 1
          fi

  # ----------------------------------------------------------------------------
  # AI Authorship Check
  # ----------------------------------------------------------------------------

  ai-authorship-check:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PRAXIS_BOT_APP_ID }}
          private-key: ${{ secrets.PRAXIS_BOT_APP_PRIVATE_KEY }}

      - name: Check for AI tool authorship
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          labels=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json labels -q '.labels[].name')
          if echo "$labels" | grep -q '^skip/ai-authorship$'; then
            echo "skip/ai-authorship label present — skipping"
            exit 0
          fi

          commits=$(gh api \
            "repos/${{ github.repository }}/pulls/${PR_NUMBER}/commits" \
            --paginate)

          AI_EMAIL='noreply@anthropic\.com'
          AI_AUTHOR='claude (code|opus|sonnet|haiku)|\bcopilot\b|\bcodeium\b|\btabnine\b|\bwindsurf\b|\bamazon q\b|\bgemini code\b|\baider\b|\banthropic\b'
          AI_TOOL='claude|anthropic|copilot|codeium|tabnine|windsurf|cursor|amazon\.q|gemini|aider|noreply@anthropic\.com'
          CREDIT='^\s*(co-authored-by|assisted-by|generated-by|authored-by)\s*:'
          ANY_TRAILER='^\s*(co-authored-by|assisted-by|generated-by|authored-by|signed-off-by)\s*:'

          violations=$(echo "$commits" | jq -r \
            --arg ai_email "$AI_EMAIL" \
            --arg ai_author "$AI_AUTHOR" \
            --arg ai_tool "$AI_TOOL" \
            --arg credit "$CREDIT" \
            --arg any_trailer "$ANY_TRAILER" '
            [
              (.[] | select(.parents | length == 1) |
                .sha[:7] as $sha |
                select(
                  (.commit.author.email |
                    test($ai_email; "i")) or
                  (.commit.committer.email |
                    test($ai_email; "i"))
                ) |
                "- `\($sha)`: AI tool email in author/committer"),
              (.[] | select(.parents | length == 1) |
                .sha[:7] as $sha |
                select(
                  (.commit.author.name |
                    test($ai_author; "i")) or
                  (.commit.committer.name |
                    test($ai_author; "i"))
                ) |
                "- `\($sha)`: AI tool in author/committer name"),
              (.[] | select(.parents | length == 1) |
                .sha[:7] as $sha |
                .commit.message | split("\n")[] |
                select(
                  (test($any_trailer; "i") and
                    test($ai_email; "i")) or
                  (test($credit; "i") and
                    test($ai_tool; "i"))
                ) |
                "- `\($sha)`: `\(gsub("^\\s+"; ""))`")
            ] | join("\n")
          ')

          if [ -n "$violations" ]; then
            marker="<!-- praxis:ai-authorship-check -->"
            already=$(gh api \
              "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --jq "[.[] | select(.body | contains(\"${marker}\"))] | length")
            if [ "$already" -eq 0 ]; then
              gh pr comment "$PR_NUMBER" \
                --repo "${{ github.repository }}" \
                --body "${marker}
          **AI tool authorship detected**:

          ${violations}

          Sorry, this project does not accept commits authored by tools as valid.
          Commits need to be authored by and signed-off by the human(s) responsible for the PR, with their name and contact."
            fi
            echo "::error::AI tool authorship found in PR commits"
            exit 1
          fi

  # ----------------------------------------------------------------------------
  # Proposal Check
  # ----------------------------------------------------------------------------

  proposal-check:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PRAXIS_BOT_APP_ID }}
          private-key: ${{ secrets.PRAXIS_BOT_APP_PRIVATE_KEY }}

      - name: Validate proposal files
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          labels=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json labels -q '.labels[].name')
          if echo "$labels" | grep -q '^skip/proposals$'; then
            echo "skip/proposals label present — skipping proposal check"
            exit 0
          fi

          proposal_files=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" --paginate \
            --jq '[.[] | select(.filename | startswith("docs/proposals/")) | select(.filename | endswith(".md")) | select(.filename != "docs/proposals/template.md")]')

          count=$(echo "$proposal_files" | jq 'length')
          if [ "$count" -eq 0 ]; then
            echo "No proposal files in this PR — skipping"
            exit 0
          fi

          errors=""

          while IFS= read -r file; do
            status=$(echo "$proposal_files" | jq -r --arg f "$file" '.[] | select(.filename == $f) | .status')

            if [ "$status" = "removed" ]; then
              continue
            fi

            content=$(gh api "repos/${{ github.repository }}/contents/${file}?ref=$HEAD_SHA" \
              --jq '.content' | base64 -d)

            frontmatter=$(echo "$content" | sed -n '/^---$/,/^---$/p' | sed '1d;$d')

            discussion=$(echo "$frontmatter" | grep -E '^discussion:' | sed 's/^discussion:[[:space:]]*//')
            if [ -z "$discussion" ]; then
              errors="${errors}\n- \`${file}\`: missing \`discussion\` field in frontmatter"
            fi

            issue=$(echo "$frontmatter" | grep -E '^issue:' | sed 's/^issue:[[:space:]]*//')
            if [ -z "$issue" ]; then
              errors="${errors}\n- \`${file}\`: missing \`issue\` field in frontmatter"
            fi

            has_authors=$(echo "$frontmatter" | grep -E '^  - ' | head -1)
            if [ -z "$has_authors" ]; then
              errors="${errors}\n- \`${file}\`: missing or empty \`authors\` list in frontmatter"
            fi

            if [ "$status" = "added" ]; then
              proposal_name=$(basename "$file" .md | sed 's/^[0-9][0-9]*_//')
              renamed_from=$(echo "$proposal_files" | jq -r --arg b "$proposal_name" \
                '[.[] | select(.status == "removed") | select(.filename | endswith($b + ".md"))] | length')
              if [ "$renamed_from" -eq 0 ]; then
                if echo "$content" | grep -qF '## How?'; then
                  errors="${errors}\n- \`${file}\`: new proposals must not include the \`## How?\` section in the first PR. Submit What? and Why? first; add How? in a follow-up."
                fi
              fi
            fi
          done < <(echo "$proposal_files" | jq -r '.[].filename')

          if [ -n "$errors" ]; then
            marker="<!-- praxis:proposal-check -->"
            already=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --jq "[.[] | select(.body | contains(\"${marker}\"))] | length")
            if [ "$already" -eq 0 ]; then
              gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" \
                --body "${marker}
          **Proposal validation failed**:
          $(echo -e "$errors")
          See [proposal process](docs/proposals.md) for requirements."
            fi
            echo "::error::Proposal validation failed"
            exit 1
          fi
