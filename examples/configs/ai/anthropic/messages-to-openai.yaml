# Anthropic Messages to Chat Completions
#
# Transforms Anthropic Messages API requests and responses for
# Chat Completions-compatible inference backends.
#
# The `anthropic_to_openai` filter name follows the proposal and
# existing config surface. It targets the OpenAI Chat Completions
# wire shape, so non-OpenAI compatible backends can use it too.
#
# Request: system hoisting, content block flattening, tool mapping.
# Response: content blocks, stop_reason, usage mapping back to
# Anthropic format. Streaming responses are converted by
# `anthropic_stream_events`.

listeners:
  - name: anthropic-gateway
    address: "127.0.0.1:8080"
    filter_chains: [anthropic-transform]

filter_chains:
  - name: anthropic-transform
    filters:
      - filter: anthropic_messages_format
        on_invalid: continue

      - filter: anthropic_to_openai
        max_body_bytes: 1048576

      # response_conditions is optional: the filter self-arms via
      # metadata and Content-Type checks internally. Adding it
      # skips filter dispatch entirely for non-SSE responses.
      - filter: anthropic_stream_events
        max_partial_event_bytes: 10485760
        response_conditions:
          - when:
              headers:
                content-type: "text/event-stream"

      - filter: path_rewrite
        replace:
          pattern: "^/v1/messages$"
          replacement: "/v1/chat/completions"
        conditions:
          - when:
              path_prefix: "/v1/messages"

      - filter: router
        routes:
          - path_prefix: "/"
            cluster: "chat-completions-backend"

      - filter: load_balancer
        clusters:
          - name: "chat-completions-backend"
            endpoints:
              - "127.0.0.1:8000"
