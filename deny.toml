[advisories]
unmaintained = "all"
maximum-db-staleness = "P30D"
ignore = [
    # Pingora transitive dependencies; not under our control.
    # derivative 2.2.0: unmaintained
    "RUSTSEC-2024-0388",
    # rustls-pemfile 2.2.0: unmaintained (via pingora-rustls)
    "RUSTSEC-2025-0134",
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
